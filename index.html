<!doctype html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ohnochoo - 플레이리스트 투표</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <header>
        <h1>ohnochoo</h1>
        <p>친구 플레이리스트 노래 추가 & 투표</p>
    </header>

    <main>
        <section class="card">
            <h2>연결 상태</h2>
            <p id="statusMessage" class="muted">Supabase 연결을 준비 중입니다...</p>
        </section>

        <section class="card">
            <h2>노래 추가</h2>
            <form id="songForm" class="grid-form">
                <label>
                    노래
                    <input id="songTitle" type="text" required placeholder="예: NEW DROP" />
                </label>
                <label>
                    아티스트
                    <input id="songArtist" type="text" required placeholder="예: Don Toliver" />
                </label>
                <label>
                    추가자
                    <input id="songAdder" type="text" required placeholder="예: 신주엽" />
                </label>
                <button type="submit">추가하기</button>
            </form>
        </section>

        <section class="card">
            <h2>평가자 관리</h2>
            <form id="memberForm" class="inline-form">
                <input id="memberName" type="text" placeholder="평가자 이름 입력" />
                <button type="submit">평가자 추가</button>
            </form>
            <div id="memberList" class="chip-list"></div>
        </section>

        <section class="card">
            <h2>현재 플레이리스트</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>노래</th>
                            <th>아티스트</th>
                            <th>추가자</th>
                            <th>평가 수</th>
                        </tr>
                    </thead>
                    <tbody id="songTableBody"></tbody>
                </table>
            </div>
        </section>

        <section class="card">
            <h2>투표 등록</h2>
            <form id="voteForm" class="grid-form">
                <label>
                    평가할 노래
                    <select id="voteSongId" required></select>
                </label>
                <label>
                    평가자
                    <select id="voterName" required>
                        <option value="">평가자를 선택하세요</option>
                    </select>
                </label>

                <fieldset>
                    <legend>결과</legend>
                    <label class="radio">
                        <input type="radio" name="decision" value="방출" required /> 방출
                    </label>
                    <label class="radio">
                        <input type="radio" name="decision" value="승격" required /> 승격
                    </label>
                </fieldset>

                <label>
                    이유
                    <textarea id="reason" rows="4" required placeholder="왜 방출/승격인지 적어주세요"></textarea>
                </label>

                <button type="submit">투표 저장</button>
            </form>
        </section>

        <section class="card">
            <h2>투표 기록</h2>
            <div id="voteHistory" class="vote-history"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>

</html>
